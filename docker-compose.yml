services:
  db:
    image: postgres:16-alpine
    container_name: teamplayers_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teamplayers_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: teamplayers_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: teamplayers_web
    restart: always
    environment:
      - DATABASE_TYPE=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=${REDIS_URL}
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  nginx:
    build:
      context: ./nginx
    container_name: teamplayers_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - NGINX_ENVSUBST_TEMPLATE_VAR_NAMES=DOMAIN_NAME
    entrypoint: /nginx_entrypoint.sh
    volumes:
      - ./nginx/nginx_entrypoint.sh:/nginx_entrypoint.sh:ro
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
      - dozzle

  dozzle:
    image: amir20/dozzle:latest
    container_name: teamplayers_dozzle
    restart: always
    environment:
      - DOZZLE_BASE=/dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  certbot:
    image: certbot/certbot:latest
    container_name: teamplayers_certbot
    restart: always
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - EMAIL=${CERTBOT_EMAIL}
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "
      trap exit TERM;
      while :; do
        if [ ! -f /etc/letsencrypt/live/$$DOMAIN_NAME/privkey.pem ]; then
          echo 'Waiting for Nginx to generate bootstrap certificates...';
          sleep 5;
          continue;
        fi;
        if [ -f /etc/letsencrypt/live/$$DOMAIN_NAME/is_dummy ]; then
          echo 'Dummy certificate detected. Cleaning up dummy files and requesting Lets Encrypt certificate...';
          rm -rf /etc/letsencrypt/live/$$DOMAIN_NAME
          rm -rf /etc/letsencrypt/archive/$$DOMAIN_NAME
          certbot certonly --webroot -w /var/www/certbot --cert-name $$DOMAIN_NAME --email $$EMAIL -d $$DOMAIN_NAME --agree-tos --no-eff-email --non-interactive --force-renewal;
          if [ $$? -eq 0 ]; then
            echo 'Certificate requested successfully.';
          else
            echo 'Certificate request failed. Retrying in 1 minute...';
            sleep 60;
            continue;
          fi;
        else
          echo 'SSL certificates are active. Running check/renewal...';
          certbot renew;
        fi;
        sleep 12h & wait $$!;
      done;"

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  certbot_conf:
  certbot_webroot:
